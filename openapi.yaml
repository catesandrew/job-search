      - $ref: '#/components/parameters/PositionId'
    put:
      operationId: updatePosition
      summary: Update position
      tags: [Positions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePositionInput'
      responses:
        '200':
          description: Updated position
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PositionWithBullets'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deletePosition
      summary: Delete position
      tags: [Positions]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes/{id}/positions/{positionId}/bullets:
    parameters:
      - $ref: '#/components/parameters/Id'
      - $ref: '#/components/parameters/PositionId'
    get:
      operationId: listBullets
      summary: List bullets for a position
      tags: [Bullets]
      responses:
        '200':
          description: List of bullets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Bullet'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createBullet
      summary: Add bullet to position
      tags: [Bullets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulletInput'
      responses:
        '201':
          description: Created bullet
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Bullet'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes/{id}/positions/{positionId}/bullets/{bulletId}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - $ref: '#/components/parameters/PositionId'
      - $ref: '#/components/parameters/BulletId'
    put:
      operationId: updateBullet
      summary: Update bullet
      tags: [Bullets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBulletInput'
      responses:
        '200':
          description: Updated bullet
          content:
