        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteSkillCategory
      summary: Delete skill category
      tags: [Skills]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes/{id}/education:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: listEducation
      summary: List education entries
      tags: [Education]
      responses:
        '200':
          description: List of education entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Education'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createEducation
      summary: Add education entry
      tags: [Education]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EducationInput'
      responses:
        '201':
          description: Created education
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Education'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes/{id}/education/{educationId}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - $ref: '#/components/parameters/EducationId'
    put:
      operationId: updateEducation
      summary: Update education entry
      tags: [Education]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEducationInput'
      responses:
        '200':
          description: Updated education
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Education'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
