    delete:
      operationId: deleteSetting
      summary: Delete setting
      tags: [Settings]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      key:
                        type: string
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    PositionId:
      name: positionId
      in: path
      required: true
      schema:
        type: string
    BulletId:
      name: bulletId
      in: path
      required: true
      schema:
        type: string
    SkillId:
      name: skillId
      in: path
      required: true
      schema:
        type: string
    EducationId:
      name: educationId
      in: path
      required: true
      schema:
        type: string
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: object
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

  schemas:
    AppStatus:
      type: string
      enum: [WISHLIST, APPLIED, INTERVIEWING, OFFER, REJECTED]

    ResumeType:
      type: string
      enum: [BASE, JOB_APPLICATION_OPTIMIZED, JOB_TITLE_OPTIMIZED]

    Application:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        company:
          type: string
        companyUrl:
          type: string
          nullable: true
        role:
          type: string
        location:
          type: string
          nullable: true
        remote:
          type: boolean
        status:
          $ref: '#/components/schemas/AppStatus'
        salaryMin:
          type: integer
          nullable: true
        salaryMax:
          type: integer
          nullable: true
        salaryFreq:
          type: string
          nullable: true
        jobUrl:
          type: string
          nullable: true
        jobDescription:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        linkedResumeId:
          type: string
          nullable: true
        linkedResume:
          type: object
          nullable: true
          properties:
            id:
              type: string
            title:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateApplication:
      type: object
      required: [company, role]
      properties:
        company:
          type: string
          minLength: 1
        companyUrl:
          type: string
        role:
          type: string
          minLength: 1
        location:
          type: string
        remote:
          type: boolean
          default: false
        status:
          $ref: '#/components/schemas/AppStatus'
        salaryMin:
          type: integer
          nullable: true
        salaryMax:
          type: integer
          nullable: true
        salaryFreq:
          type: string
          nullable: true
        jobUrl:
          type: string
          nullable: true
        jobDescription:
          type: string
          nullable: true
