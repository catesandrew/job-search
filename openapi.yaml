      operationId: listSettings
      summary: List all settings
      tags: [Settings]
      responses:
        '200':
          description: List of settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Setting'
    post:
      operationId: upsertSetting
      summary: Upsert setting by key
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertSetting'
      responses:
        '201':
          description: Upserted setting
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Setting'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/settings/{key}:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getSetting
      summary: Get setting by key
      tags: [Settings]
      responses:
        '200':
          description: Setting value
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Setting'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateSetting
      summary: Update setting value
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSetting'
      responses:
        '200':
          description: Updated setting
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Setting'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
