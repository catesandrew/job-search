openapi: 3.1.0
info:
  title: Job Search Dashboard API
  version: 0.1.0
  description: REST API for the Job Search + Resume Management Dashboard

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /api/applications:
    get:
      operationId: listApplications
      summary: List applications
      tags: [Applications]
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AppStatus'
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of applications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Application'
    post:
      operationId: createApplication
      summary: Create application
      tags: [Applications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplication'
      responses:
        '201':
          description: Created application
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Application'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/applications/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: getApplication
      summary: Get application by ID
      tags: [Applications]
      responses:
        '200':
          description: Application details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Application'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateApplication
      summary: Update application
      tags: [Applications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplication'
      responses:
        '200':
          description: Updated application
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Application'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteApplication
      summary: Delete application
      tags: [Applications]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes:
    get:
      operationId: listResumes
      summary: List resumes
      tags: [Resumes]
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/ResumeType'
      responses:
        '200':
          description: List of resumes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ResumeSummary'
    post:
      operationId: createResume
      summary: Create resume
      tags: [Resumes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResume'
      responses:
        '201':
          description: Created resume
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Resume'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/resumes/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: getResume
      summary: Get resume with all nested data
      tags: [Resumes]
      responses:
        '200':
          description: Full resume
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ResumeDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateResume
      summary: Update resume
      tags: [Resumes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResume'
      responses:
        '200':
          description: Updated resume
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Resume'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteResume
      summary: Delete resume
      tags: [Resumes]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes/{id}/clone:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      operationId: cloneResume
      summary: Deep-clone a resume as JOB_APPLICATION_OPTIMIZED
      tags: [Resumes]
      responses:
        '201':
          description: Cloned resume with nested data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ResumeDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes/{id}/profile:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: getProfile
      summary: Get resume profile
      tags: [Resumes]
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: upsertProfile
      summary: Create or update resume profile
      tags: [Resumes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileInput'
      responses:
        '200':
          description: Upserted profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes/{id}/positions:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: listPositions
      summary: List positions for a resume
      tags: [Positions]
      responses:
        '200':
          description: Positions with bullets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PositionWithBullets'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createPosition
      summary: Add position to resume
      tags: [Positions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PositionInput'
      responses:
        '201':
          description: Created position
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Position'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
