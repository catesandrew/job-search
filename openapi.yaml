        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteBullet
      summary: Delete bullet
      tags: [Bullets]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
