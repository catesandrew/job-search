                        type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes/{id}/skills:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: listSkillCategories
      summary: List skill categories for a resume
      tags: [Skills]
      responses:
        '200':
          description: List of skill categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SkillCategory'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createSkillCategory
      summary: Add skill category
      tags: [Skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCategoryInput'
      responses:
        '201':
          description: Created skill category
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SkillCategory'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resumes/{id}/skills/{skillId}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - $ref: '#/components/parameters/SkillId'
    put:
      operationId: updateSkillCategory
      summary: Update skill category
      tags: [Skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSkillCategoryInput'
      responses:
        '200':
          description: Updated skill category
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SkillCategory'
        '400':
